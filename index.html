<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>별돌이 응원중 ⭐</title>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <main class="app">
      <h1 class="title">별돌이 응원중 ⭐</h1>

      <section class="desk-scene" aria-label="별돌이가 응원하는 장면">
        <div class="work-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="byeoldol" aria-hidden="true">
          <div class="star">
            <span></span>
          </div>

          <div class="head">
            <div class="eye left-eye"></div>
            <div class="eye right-eye"></div>
            <div class="mouth"></div>
          </div>

          <div class="body">
            <div class="arm left-arm"></div>
            <div class="arm right-arm"></div>
          </div>

          <div class="laptop">
            <div class="logo">ㅎ</div>
          </div>

          <div class="keyboard" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="desk" aria-hidden="true"></div>
      </section>

      <p id="statusText">💪 힘내서 오늘 하루도 이겨내자!</p>
      <button class="cheer-button" type="button">별돌이 응원 바꾸기</button>
    </main>
  </body>
</html>
